workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 20.17.0
      xcode: latest
      cocoapods: default
      groups:
        - APPLE
      vars:
        BUNDLE_ID: "fr.app.nous"
        APP_STORE_APP_ID: "6785034254"
    scripts:
      - name: Unzip source
        script: unzip zen-app-connect.zip -d source && rsync -a source/ . && rm -rf source
      - name: Fix App ID
        script: perl -i -pe 's/app\.lovable\.[a-zA-Z0-9]*/fr.app.nous/g' capacitor.config.ts
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor iOS
        script: npm install @capacitor/core @capacitor/cli @capacitor/ios
      - name: Build web
        script: npm run build
      - name: Capacitor add ios
        script: npx cap add ios || true
      - name: Patch Podfile
        script: |
          PODFILE="ios/App/Podfile"
          perl -i -pe "s/platform :ios, '[0-9.]*'/platform :ios, '15.0'/" "$PODFILE"
          perl -i -0pe 's/post_install do \|installer\|.*?^end\n//ms' "$PODFILE"
          printf '\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['"'"'IPHONEOS_DEPLOYMENT_TARGET'"'"'] = '"'"'15.0'"'"'\n    end\n  end\nend\n' >> "$PODFILE"
          echo "=== Podfile final ==="
          cat "$PODFILE"
      - name: Capacitor sync
        script: npx cap sync ios || true
      - name: Generate app icons
        script: |
          npm install -D @capacitor/assets
          npx capacitor-assets generate --iconBackgroundColor "#F5F0E6" --iconBackgroundColorDark "#F5F0E6" --splashBackgroundColor "#F5F0E6" --splashBackgroundColorDark "#F5F0E6"
      - name: Set bundle ID
        script: /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier fr.app.nous" ios/App/App/Info.plist
      - name: Increment build number
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-app-store-build-number "6785034254" || echo 1)
          NEW_BUILD=$((LATEST + 1))
          echo "Nouveau build number : $NEW_BUILD"
          agvtool new-version -all $NEW_BUILD
      - name: Fix iOS deployment target
        script: |
          find ios/App -name "project.pbxproj" | xargs \
            perl -i -pe 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g'
          echo "Deployment target mis à jour"
      - name: Install pods
        script: cd ios/App && pod install --repo-update
      - name: Fix Xcode build phases
        script: |
          find ios/App -name "*.pbxproj" | xargs \
            perl -i -pe 's/alwaysOutOfDate = 1;/alwaysOutOfDate = 0;/g' 2>/dev/null || true
          echo "Résultat :"
          grep -rn "alwaysOutOfDate" ios/App || echo "Aucune occurrence restante"
      - name: Install certificate and profile
        script: |
          openssl genrsa -out /tmp/cert_key.pem 2048
          openssl rsa -traditional -in /tmp/cert_key.pem -out /tmp/cert_key_rsa.pem
          keychain initialize
          app-store-connect fetch-signing-files fr.app.nous \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key_rsa.pem \
            --create
          keychain add-certificates
      - name: Build and sign IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release \
            --archive-flags="-allowProvisioningUpdates"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
    artifacts:
      - build/ios/ipa/*.ipa
