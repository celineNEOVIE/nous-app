workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 20.17.0
      java: 21
    scripts:
      - name: Unzip source
        script: unzip zen-app-connect.zip -d source && rsync -a source/ . && rm -rf source
      - name: Fix App ID
        script: perl -i -pe 's/app\.lovable\.[a-zA-Z0-9]*/fr.app.nous/g' capacitor.config.ts
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor
        script: npm install @capacitor/core @capacitor/cli @capacitor/android
      - name: Build web
        script: npm run build
      - name: Capacitor add android
        script: npx cap add android
      - name: Capacitor sync
        script: npx cap sync android
      - name: Update versionCode
        script: cd android && perl -i -pe 's/versionCode 1/versionCode 2/' app/build.gradle
      - name: Build and Sign AAB
        script: cd android && echo "android { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } }" >> app/build.gradle && ./gradlew bundleRelease && jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $CM_KEYSTORE_PATH -storepass $CM_KEYSTORE_PASSWORD -keypass $CM_KEY_PASSWORD app/build/outputs/bundle/release/app-release.aab $CM_KEY_ALIAS
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 20.17.0
      xcode: latest
      cocoapods: default
      groups:
        - APPLE
      vars:
        BUNDLE_ID: "fr.app.nous"
        APP_STORE_APP_ID: "6785034254"
    scripts:
      - name: Unzip source
        script: unzip zen-app-connect.zip -d source && rsync -a source/ . && rm -rf source
      - name: Fix App ID
        script: perl -i -pe 's/app\.lovable\.[a-zA-Z0-9]*/fr.app.nous/g' capacitor.config.ts
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor iOS
        script: npm install @capacitor/core @capacitor/cli @capacitor/ios
      - name: Fix all podspecs deployment target
        script: find ./node_modules/@capacitor -name "*.podspec" | xargs perl -i -pe "s/s\.(ios\.)?deployment_target\s*=\s*'[0-9.]+'/s.ios.deployment_target = '14.0'/g"
      - name: Build web
        script: npm run build
      - name: Capacitor add ios
        script: npx cap add ios
      - name: Fix Podfile
        script: perl -i -pe "s/platform :ios, '[0-9.]+'/platform :ios, '14.0'/g" ios/App/Podfile
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Set bundle ID
        script: /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier fr.app.nous" ios/App/App/Info.plist
      - name: Install pods
        script: cd ios/App && pod install
      - name: Build and sign IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
    artifacts:
      - build/ios/ipa/*.ipa
