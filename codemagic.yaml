ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 20.17.0
      xcode: latest
      cocoapods: default
      groups:
        - APPLE
      vars:
        BUNDLE_ID: "fr.app.nous"
        APP_STORE_APP_ID: "6785034254"
    scripts:
      - name: Unzip source
        script: unzip zen-app-connect.zip -d source && rsync -a source/ . && rm -rf source

      - name: Fix App ID
        script: perl -i -pe 's/app\.lovable\.[a-zA-Z0-9]*/fr.app.nous/g' capacitor.config.ts

      - name: Install dependencies
        script: npm install

      - name: Install Capacitor iOS
        script: npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Build web
        script: npm run build

      - name: Capacitor add ios
        script: npx cap add ios || true

      - name: Patch Podfile
        script: |
          PODFILE="ios/App/Podfile"
          
          # Forcer iOS 15 minimum
          perl -i -pe "s/platform :ios, '[0-9.]*'/platform :ios, '15.0'/" "$PODFILE"
          
          # Supprimer tout post_install existant pour éviter les doublons
          perl -i -0pe 's/post_install do \|installer\|.*?^end\n//ms' "$PODFILE"
          
          # Ajouter le post_install hook qui corrige le bug Xcode 15+ (code 65)
          cat >> "$PODFILE" << 'PODEOF'

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
    end
  end
end
PODEOF
          
          echo "=== Podfile final ==="
          cat "$PODFILE"

      - name: Capacitor sync
        script: npx cap sync ios || true

      - name: Set bundle ID
        script: /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier fr.app.nous" ios/App/App/Info.plist

      - name: Install pods
        script: cd ios/App && pod install --repo-update

      - name: Fix Xcode build phases (code 65)
        script: |
          # Patch le .pbxproj généré par CocoaPods pour désactiver alwaysOutOfDate
          find ios/App -name "*.pbxproj" | xargs \
            perl -i -pe 's/alwaysOutOfDate = 1;/alwaysOutOfDate = 0;/g'
          echo "Build phases patchées :"
          grep -r "alwaysOutOfDate" ios/App || echo "Aucune occurrence restante"

      - name: Build and sign IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release \
            --archive-flags="-allowProvisioningUpdates"

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false

    artifacts:
      - build/ios/ipa/*.ipa
