workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 20.17.0
      xcode: latest
      cocoapods: default
      groups:
        - APPLE
      vars:
        BUNDLE_ID: "fr.app.nous"
        MARKETING_VERSION: "1.9"
    scripts:
      - name: Unzip source
        script: |
          unzip zen-app-connect.zip -d source
          if [ $(find source -mindepth 1 -maxdepth 1 -type d | wc -l) -eq 1 ] && [ $(find source -mindepth 1 -maxdepth 1 -type f | wc -l) -eq 0 ]; then
            INNER=$(find source -mindepth 1 -maxdepth 1 -type d)
            rsync -a "$INNER"/ .
          else
            rsync -a source/ .
          fi
          rm -rf source
      - name: Fix App ID
        script: perl -i -pe 's/app\.lovable\.[a-zA-Z0-9]*/fr.app.nous/g' capacitor.config.ts
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor iOS
        script: npm install @capacitor/core @capacitor/cli @capacitor/ios
      - name: Build web
        script: npm run build
      - name: Capacitor add ios
        script: npx cap add ios || true
      - name: Capacitor sync ios
        script: npx cap sync ios || true
      - name: Inject app icons
        script: |
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          SRC_DIR=$(find . -name "Contents.json" -path "*ios_icons*" -exec dirname {} \; | head -n 1)
          if [ -z "$SRC_DIR" ]; then
            echo "ERREUR : Contents.json introuvable dans ios_icons"
            find . -iname "*ios_icons*"
            exit 1
          fi
          echo "Dossier source trouve : $SRC_DIR"
          cp "$SRC_DIR"/*.png "$ICON_DIR/" 2>/dev/null || true
          cp "$SRC_DIR"/Contents.json "$ICON_DIR/"
          echo "Icones injectees :"
          ls -la "$ICON_DIR/"
      - name: Patch Podfile
        script: |
          PODFILE="ios/App/Podfile"
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '15.0'/" "$PODFILE" || true
          sed -i '' "s/config.build_settings\['IPHONEOS_DEPLOYMENT_TARGET'\] = .*/config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'/" "$PODFILE" || true
          echo "=== Podfile final ==="
          cat "$PODFILE"
      - name: Set bundle ID
        script: /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier fr.app.nous" ios/App/App/Info.plist
      - name: Add microphone and speech recognition permissions
        script: |
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string Cette application utilise le microphone pour exprimer vos ressentis a la voix dans Mon Plan Perso." ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSSpeechRecognitionUsageDescription string Utilise pour dicter votre message dans Mon Plan Perso." ios/App/App/Info.plist
          echo "=== Verification ==="
          /usr/libexec/PlistBuddy -c "Print :NSMicrophoneUsageDescription" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Print :NSSpeechRecognitionUsageDescription" ios/App/App/Info.plist
      - name: Set marketing version
        script: |
          cd ios/App
          echo "Nouvelle version produit : $MARKETING_VERSION"
          agvtool new-marketing-version $MARKETING_VERSION
      - name: Increment build number
        script: |
          cd ios/App
          NEW_BUILD=$(date +%s)
          echo "Nouveau build number : $NEW_BUILD"
          agvtool new-version -all $NEW_BUILD
      - name: Fix iOS deployment target
        script: |
          find ios/App -name "project.pbxproj" | xargs \
            perl -i -pe 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g'
          echo "Deployment target mis a jour"
      - name: Install pods
        script: cd ios/App && pod install --repo-update
      - name: Fix Xcode build phases
        script: |
          find ios/App -name "*.pbxproj" | xargs \
            perl -i -pe 's/alwaysOutOfDate = 1;/alwaysOutOfDate = 0;/g' 2>/dev/null || true
          echo "Resultat :"
          grep -rn "alwaysOutOfDate" ios/App || echo "Aucune occurrence restante"
      - name: Install certificate and profile
        script: |
          openssl genrsa -out /tmp/cert_key.pem 2048
          openssl rsa -traditional -in /tmp/cert_key.pem -out /tmp/cert_key_rsa.pem
          keychain initialize
          app-store-connect fetch-signing-files fr.app.nous \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key_rsa.pem \
            --create
          keychain add-certificates
      - name: Build and sign IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release \
            --archive-flags="-allowProvisioningUpdates"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
    artifacts:
      - build/ios/ipa/*.ipa

  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 20.17.0
      java: 21
      groups:
        - ANDROID
      vars:
        BUNDLE_ID: "fr.app.nous"
        VERSION_NAME: "1.3"
    scripts:
      - name: Unzip source
        script: |
          unzip zen-app-connect.zip -d source
          if [ $(find source -mindepth 1 -maxdepth 1 -type d | wc -l) -eq 1 ] && [ $(find source -mindepth 1 -maxdepth 1 -type f | wc -l) -eq 0 ]; then
            INNER=$(find source -mindepth 1 -maxdepth 1 -type d)
            rsync -a "$INNER"/ .
          else
            rsync -a source/ .
          fi
          rm -rf source
      - name: Fix App ID
        script: perl -i -pe 's/app\.lovable\.[a-zA-Z0-9]*/fr.app.nous/g' capacitor.config.ts
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor Android
        script: npm install @capacitor/core @capacitor/cli @capacitor/android
      - name: Build web
        script: npm run build
      - name: Capacitor add android
        script: npx cap add android || true
      - name: Capacitor sync android
        script: npx cap sync android || true
      - name: Add speech recognition permissions
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          echo "=== Manifest avant modification ==="
          cat "$MANIFEST"
          perl -i -pe 's|(<uses-permission android:name="android.permission.INTERNET" ?/>)|$1\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />|' "$MANIFEST"
          perl -0777 -i -pe 's|(</manifest>)|    <queries>\n        <intent>\n            <action android:name="android.speech.RecognitionService" />\n        </intent>\n    </queries>\n$1|' "$MANIFEST"
          echo "=== Manifest apres modification ==="
          cat "$MANIFEST"
      - name: Copy keystore into project
        script: cp signing.keystore android/app/signing.keystore
      - name: Configure signing in build.gradle
        script: |
          GRADLE_FILE="android/app/build.gradle"
          perl -i -pe 's/android \{/android {\n    signingConfigs {\n        release {\n            storeFile file("signing.keystore")\n            storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")\n            keyAlias System.getenv("ANDROID_KEY_ALIAS")\n            keyPassword System.getenv("ANDROID_KEY_PASSWORD")\n        }\n    }/' "$GRADLE_FILE"
          perl -0777 -i -pe 's/(buildTypes\s*\{\s*release\s*\{)/$1\n            signingConfig signingConfigs.release/s' "$GRADLE_FILE"
          echo "=== build.gradle final ==="
          cat "$GRADLE_FILE"
      - name: Exclude duplicate Kotlin stdlib
        script: |
          GRADLE_FILE="android/app/build.gradle"
          printf '\nconfigurations.all {\n    exclude group: '"'"'org.jetbrains.kotlin'"'"', module: '"'"'kotlin-stdlib-jdk7'"'"'\n    exclude group: '"'"'org.jetbrains.kotlin'"'"', module: '"'"'kotlin-stdlib-jdk8'"'"'\n}\n' >> "$GRADLE_FILE"
          echo "=== app/build.gradle avec exclusion Kotlin ==="
          tail -10 "$GRADLE_FILE"
      - name: Set version code and name
        script: |
          GRADLE_FILE="android/app/build.gradle"
          NEW_VERSION_CODE=$(date +%s)
          perl -i -pe "s/versionCode .*/versionCode $NEW_VERSION_CODE/" "$GRADLE_FILE"
          perl -i -pe "s/versionName .*/versionName \"$VERSION_NAME\"/" "$GRADLE_FILE"
          echo "Version code: $NEW_VERSION_CODE / Version name: $VERSION_NAME"
      - name: Build AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
