workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 20.17.0
      java: 21
    scripts:
      - name: Unzip source
        script: unzip zen-app-connect.zip -d source && cp -r source/* . && rm -rf source
      - name: Fix App ID
        script: sed -i '' 's/app\.lovable\.[a-zA-Z0-9]*/fr.app.nous/g' capacitor.config.ts
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor
        script: npm install @capacitor/core @capacitor/cli @capacitor/android
      - name: Build web
        script: npm run build
      - name: Capacitor add android
        script: npx cap add android
      - name: Capacitor sync
        script: npx cap sync android
      - name: Build AAB
        script: |
          cd android
          echo "android { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22' } } }" >> app/build.gradle
          ./gradlew bundleRelease
      - name: Sign AAB
        script: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore ../signing.keystore \
            -storepass Yv3yr54ly69Q \
            -keypass Yv3yr54ly69Q \
            android/app/build/outputs/bundle/release/app-release.aab \
            my-key-alias
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
