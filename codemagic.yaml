workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 20.17.0
      xcode: latest
      cocoapods: default
      groups:
        - APPLE
      vars:
        BUNDLE_ID: "fr.app.nous"
        APP_STORE_APP_ID: "6785034254"
    scripts:
      - name: Unzip source
        script: unzip zen-app-connect.zip -d source && rsync -a source/ . && rm -rf source
      - name: Fix App ID
        script: perl -i -pe 's/app\.lovable\.[a-zA-Z0-9]*/fr.app.nous/g' capacitor.config.ts
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor iOS
        script: npm install @capacitor/core @capacitor/cli @capacitor/ios
      - name: Build web
        script: npm run build
      - name: Capacitor add ios
        script: npx cap add ios || true
      - name: Capacitor sync
        script: npx cap sync ios || true
      - name: Inject app icons
        script: |
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          cp -r ios_icons/* "$ICON_DIR/"
          echo "Icônes injectées :"
          ls "$ICON_DIR/"
      - name: Patch Podfile
        script: |
          PODFILE="ios/App/Podfile"
          perl -i -pe "s/platform :ios, '[0-9.]*'/platform :ios, '15.0'/" "$PODFILE"
          perl -i -0pe 's/post_install do \|installer\|.*?^end\n//ms' "$PODFILE"
          printf '\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do
