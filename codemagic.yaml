workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 20.17.0
      java: 17
    scripts:
      - name: Unzip source
        script: unzip zen-app-connect.zip -d source && cp -r source/* . && rm -rf source
      - name: Fix App ID
        script: sed -i 's/app\.lovable\.[a-z0-9]*/fr.app.nous/g' capacitor.config.ts
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor
        script: npm install @capacitor/core @capacitor/cli @capacitor/android
      - name: Build web
        script: npm run build
      - name: Capacitor add android
        script: npx cap add android
      - name: Capacitor sync
        script: npx cap sync android
      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab

       
